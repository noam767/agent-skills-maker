## Bitnami PostgreSQL values for local Confluence testing
## Pinned chart: 18.6.7 / app: PostgreSQL 17 (compatible with Confluence 10.x)

global:
  storageClass: hostpath

auth:
  database: confluence
  username: confluence
  existingSecret: confluence-db-secret
  secretKeys:
    adminPasswordKey: postgres-password
    userPasswordKey: password

primary:
  persistence:
    enabled: true
    size: 4Gi
    storageClass: hostpath

  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

## Single-node, no replicas needed for local dev
readReplicas:
  replicaCount: 0
