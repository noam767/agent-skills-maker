## Atlassian Confluence Data Center – local Docker Desktop k8s
## Chart: atlassian-data-center/confluence 2.0.13 (app 10.2.10)
## Single-replica, NodePort access, hostPath storage

replicaCount: 1

image:
  repository: atlassian/confluence
  pullPolicy: IfNotPresent
  tag: "10.2.10"

# ── Database ────────────────────────────────────────────────────────────────
database:
  type: postgresql
  url: "jdbc:postgresql://confluence-db-postgresql.confluence.svc.cluster.local:5432/confluence"
  credentials:
    secretName: confluence-db-credentials
    usernameSecretKey: username
    passwordSecretKey: password

# ── License ─────────────────────────────────────────────────────────────────
# No secret supplied — the setup wizard will prompt for the license key.
confluence:
  license:
    secretName: ""
    secretKey: license-key

  # ── Service (NodePort for direct local access) ───────────────────────────
  service:
    port: 80
    type: NodePort
    nodePort: 30090

  # ── JVM / Resources ───────────────────────────────────────────────────────
  jvm:
    maximumHeap: "1024m"
    minimumHeap: "1024m"
    reservedCodeCache: "256m"

  resources:
    jvm:
      maxHeap: "1024m"
      minHeap: "1024m"
      reservedCodeCache: "256m"

  container:
    resources:
      requests:
        cpu: "1"
        memory: "2Gi"
      limits:
        cpu: "2"
        memory: "3Gi"

  # ── Tomcat / context path ─────────────────────────────────────────────────
  tomcatConfig:
    generateByHelm: true

  ports:
    http: 8090
    hazelcast: 5701

  # ── Additional JVM args ───────────────────────────────────────────────────
  additionalJvmArgs:
    - "-Dconfluence.setup.server.url=http://localhost:30090"

  # ── Readiness / liveness probes – relaxed for slow initial startup ────────
  readinessProbe:
    enabled: true
    initialDelaySeconds: 60
    periodSeconds: 15
    failureThreshold: 30
    timeoutSeconds: 10

# ── Synchrony (collaborative editing) – minimal for local dev ────────────────
synchrony:
  enabled: true
  replicaCount: 1

  service:
    port: 80
    type: ClusterIP

  resources:
    jvm:
      maxHeap: "512m"
      minHeap: "256m"

  container:
    resources:
      requests:
        cpu: "250m"
        memory: "768Mi"
      limits:
        cpu: "1"
        memory: "1Gi"

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  localHome:
    persistentVolumeClaim:
      create: true
      storageClassName: hostpath
      resources:
        requests:
          storage: 8Gi
    mountPath: "/var/atlassian/application-data/confluence"

  sharedHome:
    # For single-replica local dev an emptyDir shared-home is fine
    persistentVolumeClaim:
      create: false
    customVolume:
      emptyDir: {}
    mountPath: "/var/atlassian/application-data/shared-home"

# ── Ingress – disabled; using NodePort instead ────────────────────────────────
ingress:
  create: false
